# Round-6 v2 TEST config — Internal MRI (Bruker ParaVision).
#
# v2 REDO 2026-05-27 (was v1 2026-05-22): slim-folder layout mirroring
# NI v2.1. DICOMs land flat under `<ACQ-ID>.data/`; JCAMP-DX aux files
# stay on the platform (parsed content in metadata.json.mri._raw_metadata);
# DICOM UIDs in the curated headers; no-DICOM acquisitions registered
# with empty .data/ placeholder. See `equipment/mri-platform/
# internal_mri_data_handling_workflow_notes.md` "Round-6 v2 reshape"
# section for the v1 → v2 change history.
#
# Scope: 7 study folders manually pulled from the 7T MRI server
# (`/opt/PV-7.0.0/data/nmr/`) to local staging at D:\projects\gjesus3\data_test\.
# Studies span 2025-10 through 2026-03; animal protocols 0423 and 0424.
# 3 of 7 projects (m13/m14 protocol 0423 + m29 protocol 0423) have ZERO
# DICOMs — students hadn't run Bruker's exporter; those get registered
# with empty .data/ placeholder folders.
#
# This is a TEST INGEST — purge after review (quasi-production lifecycle).

ingest:
  delete_source_after_ingest: false
  auto_create_projects: true
  acquisition_layout: folder
  copy_strategy: mri_paravision_v2
  reconstructions: all
  # Phase 2 of tasks.md §3.1 (2026-06-01): regenerate DICOMs via
  # Dicomifier for no-DICOM exams (3 of 7 source projects had this
  # state at the original round-6 v2 ingest). When this config is
  # re-run with the flag below, those exams get filled in via
  # idempotent re-ingest. Requires `dicomifier` on PATH (activate
  # the conda env: `conda activate dicomifier-pilot`).
  auto_regenerate_dicom: true

auto_discover:
  staging_dir: "D:/projects/gjesus3/data_test"
  pattern: "*/*"
  filename_parse:
    source: parent_name
    regex: '(?P<jrc_id>jrc_?\d{6,8}_m(?P<animal_num>\d+)_(?P<project_code>\d{4}))'

  # Phase 3: animal-facility DB subject lookup. project_alias = protocol code
  # (0423/0424), animal_code = bare animal number (animal_num, already without
  # the "m"). NON-BLOCKING — a DB miss / no-creds queues the acq to
  # registries/pending_subject_metadata.csv and still ingests (08_METADATA
  # §4.4.6). See tools/animal_db.py.
  subject_from_db: true
  subject_lookup:
    project_alias: "${discovered.project_code}"   # e.g. "0423"
    animal_code:   "${discovered.animal_num}"     # e.g. "13"

registry:
  instrument:           MRI
  data_ecosystem:       DICOM
  instrument_model:     "Bruker BioSpec 7T"
  modalities_in_study:  NA
  researcher:               NMR-platform
  data_source:          internal
  sample_id:            "${discovered.jrc_id}"
  sample_type:          organism
  session_id:           "${discovered.jrc_id}"
  acquisition_datetime: discovered.mri_acquisition_datetime
  project_hint:         "ae-biomegune-${discovered.project_code}"
  notes:                "TEST INGEST 2026-05-27 v2 REDO - purge after team exhibition (internal MRI ${discovered.mri_sequence_name} exam ${discovered.mri_exam_number}, animal m${discovered.animal_num}, recon ${discovered.mri_recon_indices})"

auto_create_project:
  owner:       "NMR-platform"
  description: "TEST auto-created from internal MRI round-6 v2 — animal-protocol code ${discovered.project_code}. Purge after team exhibition. PROVISIONAL project_hint convention (05_PROJECTS §9 PROJ-05)."
  notes:       "Auto-created during round-6 v2 ingest 2026-05-27. Will be purged with the rest of the quasi-production data after the team exhibition."

# Project hard-link name (resolver-evaluated at link-creation time; no extension).
# Folder-primary acq (<ACQ-ID>.data) -> real folder of per-file hard links.
# Inherits the MRI default pattern from the per-instrument template:
# unique per (sample, date, exam, recon) — fixes the round-6 first-ingest
# collision bug where exam-number-only names clashed across animals.
# Example resolved value: MRI_jrc_251016_m17_0424_20251016_29_3
link_filename: "MRI_${sample_id}_${acq_date}_${discovered.mri_exam_number}_${discovered.mri_recon_indices}"

# Phase 3 preclinical metadata (sample_type = organism). NON-BLOCKING: null
# tri-state values just WARN; the acq still ingests (08_METADATA §4.7). These
# round-6 v2 study folders span animal protocols 0423 + 0424 and multiple
# timepoints, so the cohort/condition genuinely varies acq-to-acq — left as
# null sentinels here for the TEST re-ingest; fill per batch (or override
# per-acq at /projects/<proj>/metadata/<acq_id>.json) when the cohort key
# for this exhibition data is confirmed.
condition:
  is_control:    null
  disease_model: ""
  disease_state: ""
  source:        "operator-entered"

anatomy:
  is_whole_body: null
  # region:                     # required when is_whole_body=false
  #   label:    "heart"
  #   ontology: "UBERON"
  #   id:       "UBERON:0000948"
  source:        "operator-entered"
