# REBUILD config — Collaborator/external MRI (XMRI), HPIC cohort.
#
# Authored 2026-06-01 for the gjesus3-data container rebuild. HPIC half of the
# original interactively-ingested 75 collaborator DICOM acquisitions; see
# lions_cardiac_mri_TEST.yaml for the full rationale and the discovered.*
# reference card (identical here).
#
# Source: the off-NAS collaborator copy at C:\Users\rtasseff\temp\HPIC_33cases\
# (HPICnn.rar archives — note .rar, extracted via 7-Zip by
# tools/extract_xmri_archives.py) into per-case directories on fast local
# staging (off-NAS, like every other batch). The ingest copies into NAS /raw/.
#
# Differences from the LIONS config: data_source, project_hint (PROJ-0002),
# and the staging dir. instrument_model is still omitted (blank) — the
# original HPIC rows carried per-case Philips model strings (Ingenia Elition X
# / Ingenuity / IntelliSpace Portal); those live in rebuild_baseline + the old
# sidecars and are not reconstructable from a config without the deferred
# DICOM extractor (tasks.md §3.1).
#
# On-disk shape: `acquisition_layout: archive` stores the original source
# archive renamed to `<ACQ-ID>.rar` (primary_kind=archive, file_format=.rar,
# file_count = extracted DICOM instance count) — one fast SMB transfer per
# case. Note HPIC sources are .rar (LIONS are .zip); the stored primary keeps
# the source extension. Verify by acquisition count (33), not byte-parity.
# TEST INGEST — purge after the team exhibition (quasi-production).

ingest:
  delete_source_after_ingest: false
  auto_create_projects: true
  # Archive-as-primary: store the ORIGINAL .rar per case (one fast SMB
  # transfer) rather than copying ~20k extracted DICOM files each. Metadata
  # is still read from the extracted dirs in staging_dir; the archive to
  # store is found in archive_primary_from by matching the case folder name.
  acquisition_layout: archive
  archive_primary_from: "C:/Users/rtasseff/temp/HPIC_33cases"

auto_discover:
  staging_dir: "D:/projects/gjesus3/xmri_staging/HPIC_33cases_extracted"
  pattern: "*/"

registry:
  instrument:           XMRI
  data_ecosystem:       DICOM
  modalities_in_study:  NA
  operator:             RT
  data_source:          collaborator:HPIC
  sample_id:            "${discovered.folder_name}"
  sample_type:          "cardiac MRI study"
  acquisition_datetime: NA
  project_hint:         PROJ-0002
  notes:                "TEST INGEST 2026-06-01 rebuild - collaborator HPIC cardiac MRI, re-ingested from config (originally interactive round 1-2). Purge after team exhibition."

auto_create_project:
  owner:       "RT"
  description: "Collaborator HPIC cardiac MRI study (external DICOM). Re-created during the gjesus3-data container rebuild 2026-06-01. Purge after team exhibition."
  notes:       "Auto-created on XMRI re-ingest 2026-06-01. PROJ-0002 in the original registry."

# .lnk shortcut name (resolver-evaluated at link-creation time).
# Example resolved value: XMRI_HPIC02_20211022
link_filename: "XMRI_${sample_id}_${acq_date}"
