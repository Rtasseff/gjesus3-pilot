# AxioScan 7 — 2026-04-22 day folder ingest
#
# Test ingest config used during AxioScan first-pass development. The
# rows it produces are flagged "TEST INGEST 2026-05-06 - purge after
# review"; see _test_artifacts.txt for the cleanup tracker.

ingest:
  delete_source_after_ingest: false
  # Auto-create the project if `project_hint` doesn't match an existing
  # project_id or short_name. The first ingest creates it; subsequent
  # ingests with the same hint reuse via short_name lookup.
  auto_create_projects: true

auto_discover:
  staging_dir: "S:/goptical/GOpticalUsers data/AxioScan/20260422"
  pattern: "*.czi"
  filename_parse:
    separator: "_"
    fields: [group_code, operator, project, sample_id, stain, magnification]
  filter:
    group_code: MFB
  acquisition_date_from: parent_folder_name

registry:
  instrument:           ZWSI
  data_ecosystem:       MICROSCOPY
  # Prefer the microscope-issued name from the .czi over a literal,
  # so different Axioscan units stay distinguishable.
  instrument_model:     discovered.czi_microscope_name
  modalities_in_study:  NA
  operator:             discovered.operator
  data_source:          internal
  sample_id:            discovered.sample_id
  sample_type:          NA
  # Precise timestamp from the .czi (not the day-folder coarse date).
  # Day-folder fallback is `discovered.acquisition_date` if the .czi
  # ever lacks AcquisitionDateAndTime.
  acquisition_datetime: discovered.czi_acquisition_datetime
  project_hint:         discovered.project
  notes:                "TEST INGEST 2026-05-06 - purge after review (${discovered.stain} stain at ${discovered.czi_objective_mag}x NA${discovered.czi_objective_na})"
