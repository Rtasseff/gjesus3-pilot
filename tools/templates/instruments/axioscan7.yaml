# Per-instrument template — AxioScan 7 (Zeiss whole-slide scanner).
# Instrument code: ZWSI. Ecosystem: MICROSCOPY.
#
# Copy this file to `tools/configs/axioscan7_<batch>.yaml` (a name that
# identifies this run — e.g. the day folder date or campaign label),
# edit the marked placeholders, then run.
#
# ============================================================================
# AUTO-DISCOVERED FIELDS AVAILABLE TO THE OPERATOR
# ============================================================================
# Every entry below is automatically populated per acquisition and may be
# referenced as `discovered.<name>` (bare ref) or `${discovered.<name>}`
# (interpolation) in any resolver-evaluated YAML field below (`registry:`,
# `auto_create_project:`, top-level `link_filename:`).
#
# Filename chunks (from filename_parse below, split on `_`):
#   discovered.group_code         e.g. "MFB" (project filter — fixed)
#   discovered.operator           e.g. "MBC" (initials)
#   discovered.project            e.g. "0423" — animal-project short id
#   discovered.sample_short       e.g. "ID13B" — short sample identifier
#                                  (organ-letter suffix not parsed today)
#   discovered.stain              e.g. "WGA"
#   discovered.magnification      e.g. "10x"
#
# Standard auto-discovery (any instrument):
#   discovered.filename           full basename incl. .czi extension
#   discovered.acquisition_date   YYYYMMDD parsed from the parent folder
#                                  name (used only as a fallback when
#                                  .czi-embedded timestamp is unavailable)
#
# .czi-embedded metadata (21 fields, all prefixed `czi_`) — extracted via
# `czifile` from each file at ingest time. See 09_MODALITIES §1.1 for the
# full per-instrument table. Highlights:
#   discovered.czi_acquisition_datetime  ISO timestamp (preferred)
#   discovered.czi_microscope_name       e.g. "Axioscan 7"
#   discovered.czi_microscope_type       e.g. "Upright"
#   discovered.czi_objective_name        e.g. "Plan-Apochromat 20x/0.8 M27"
#   discovered.czi_objective_mag         e.g. "20"
#   discovered.czi_objective_na          e.g. "0.8"
#   discovered.czi_pixel_size_x_um       µm; same for y
#   discovered.czi_size_x / _y / _c / _z / _t / _s / _m   image dims
#   discovered.czi_pixel_type            e.g. "Bgr24"
#   discovered.czi_compression           e.g. "JpegXr"
#   discovered.czi_acquisition_mode      e.g. "WideField"
#   discovered.czi_contrast_method       e.g. "Brightfield"
#   discovered.czi_user                  ZEN account
#   discovered.czi_zen_version           e.g. "3.6"
#
# Resolver also provides these in resolver-evaluated fields below:
#   ${instrument}              "ZWSI" after registry resolution
#   ${sample_id}               resolved composite per registry: block
#   ${acquisition_datetime}    resolved ISO datetime
#   ${original_name}           source filename (the .czi as deposited)
#   ${acq_id}                  generated ACQ-ID (e.g. ACQ-20260215-ZWSI-001)
#   ${acq_date}                YYYYMMDD form of the acquisition date
#
# ============================================================================
# WHAT'S PRE-FILLED (don't touch unless you know why)
# ============================================================================
#   - `pattern`, `filename_parse`, `filter`, `acquisition_date_from`
#     encode the AxioScan-7 / MFB filename and day-folder conventions.
#   - `instrument`, `data_ecosystem`, `instrument_model`,
#     `acquisition_datetime` use the .czi-embedded values where they
#     beat any filename or folder-derived guess.
#   - `sample_id`, `project_hint`: pilot conventions per
#     06_REGISTRIES §2.3 (composite sample_id) and the AE-biomeGUNE-NNNN
#     animal-project naming.
#   - `auto_create_project:` — first-time project creation defaults; see
#     10_TOOLS §2.1.4.
#   - `link_filename:` — `${instrument}_${original_name}` keeps the full
#     informative filename + a clear instrument prefix in the project's
#     raw_linked/ folder. Resolver-evaluated at link-creation time.
#   - Phase 3 enrichment (LIVE, this template): `subject:` is auto-filled
#     from the animal-facility DB (auto_discover.subject_from_db +
#     subject_lookup below; project_alias from project, animal_code from
#     sample_short), and a live `condition:` block (set once per batch) is
#     written into every metadata.json. sample_type = tissue so subject +
#     condition fire; NO anatomy: block (anatomy is organism-only — the
#     organ that a slide came from is a sample-level anatomical_entity, not
#     an in-vivo whole-body/ROI flag). NON-BLOCKING: a DB miss queues to
#     registries/pending_subject_metadata.csv and the acq still ingests.
#     See 08_METADATA §4.4-4.7.
#
# ============================================================================
# WHAT YOU MUST EDIT PER BATCH
# ============================================================================
#   - `auto_discover.staging_dir`         <-- point at this batch's day folder
#   - `registry.notes`                    <-- short batch description
#
# What you may want to change per batch (rarely):
#   - `ingest.delete_source_after_ingest` (default false; opt in only after
#     you've verified a real run for this batch)
#   - `ingest.auto_create_projects` (default true for AxioScan)
#
# Extends the universal starter at tools/templates/ingest_template.yaml.
#
# Field vocabularies (suggested, NOT enforced): see 08_METADATA §4.8 for the
# domain standards to prefer — species (NCBI Taxonomy) / strain (IMSR/MGI/RGD) /
# disease_model + disease_state (MONDO) / cell_line (Cellosaurus) / anatomy (UBERON).
#
# Per-instrument convention only — other groups using the same scanner
# with different filename conventions would need their own template.
#
# Project naming note: AE-biomeGUNE-NNNN comes from the animal-project
# approval system — durable and shared across the institute. Reasonable
# interim pattern per 05_PROJECTS §9 (PROJ-05); not a stopgap.

ingest:
  delete_source_after_ingest: false
  auto_create_projects: true

auto_discover:
  # EDIT: absolute path to this batch's day folder under the AxioScan
  # share. Use forward slashes; Python normalizes on Windows.
  staging_dir: "S:/goptical/GOpticalUsers data/AxioScan/<YYYYMMDD>"
  pattern: "*.czi"
  filename_parse:
    separator: "_"
    # AxioScan + MFB convention:
    # <group_code>_<operator>_<project>_<sample_short>_<stain>_<magnification>.czi
    fields: [group_code, operator, project, sample_short, stain, magnification]
  filter:
    group_code: MFB
  acquisition_date_from: parent_folder_name

  # --- Subject metadata from the animal-facility DB (Phase 3) ---
  # For a tissue section, the "subject" is the ANIMAL the tissue came from.
  # When true, the ingest looks that animal up in the animal-facility DB and
  # writes the subject: block (species/strain/sex/DOB->age/procedures) into
  # metadata.json, tying the slide back to its source animal. Needs DB
  # credentials at ~/.my.cnf on the ingest machine + on-network; on a
  # miss / no-creds the acq still ingests with a source="pending-db"
  # placeholder and is queued to registries/pending_subject_metadata.csv for
  # later recovery (NON-BLOCKING, 08_METADATA §4.4.6). See tools/animal_db.py.
  subject_from_db: true
  subject_lookup:
    # --- HOW THE SOURCE ANIMAL IS LOOKED UP (automatic; no operator input) ---
    # The enrichment writer builds the animal-facility DB key from two
    # discovered.* fields and fills metadata.json.subject (species / strain / sex
    # / date_of_birth -> derived age / procedures), tying the slide to its source
    # animal.
    #
    # REQUIREMENT for a NEW convention: keep a metadata label named `project`
    # carrying the animal-protocol code (the NNNN), and one named `sample_short`
    # carrying the animal number. If your convention uses different label names,
    # change the two ${discovered.*} refs below to point at them — otherwise the
    # lookup simply won't fire (the acq still ingests, just with no subject:).
    #
    # PARSE (tools/ingest/subject_id.py — pure string parser, unit-tested):
    #   sample_short "ID137Lu"
    #       strip leading "ID"/"m" + zeros  ->  animal_code  137
    #       trailing letters "Lu"           ->  organ (lung)  [kept SEPARATELY as a
    #         sample-level anatomical_entity / anatomy.region — NOT part of the
    #         animal code and NOT part of the DB key]
    #   project      "1123"                 ->  project_alias 1123
    #   DB key       (project_alias 1123, animal_code 137)
    #   subject id   137-AE-biomaGUNE-1123  (via animal_db.compose_subject_id;
    #                                         reused verbatim as the canonical id)
    #   Other accepted short codes: "ID13B" -> 13 (+organ B); "m13" -> 13; bare
    #   "14" -> 14. Non-numeric (e.g. "phantom" / "qc") -> no lookup (unknown).
    project_alias: "${discovered.project}"        # the NNNN animal-protocol code, e.g. "1123"
    animal_code:   "${discovered.sample_short}"   # carries the animal number, e.g. "ID137Lu"

registry:
  instrument:           ZWSI
  data_ecosystem:       MICROSCOPY
  instrument_model:     discovered.czi_microscope_name
  modalities_in_study:  NA
  # researcher = the person who set up the experiment (registry person column,
  # RENAMED from `operator` 2026-06-09). For microscopy the researcher and the
  # operator (the tech who ran the scope) are OFTEN DIFFERENT. The operator is
  # in the filename (discovered.operator, a REQUIRED chunk) and is recorded in
  # the sidecar `operator:` below; the researcher is NOT in the filename, so
  # SET IT PER BATCH here (or via the GUI's Researcher box).
  researcher:           "<researcher - set per batch / in the GUI>"
  data_source:          internal
  sample_id:            "${discovered.project}_${discovered.sample_short}"
  sample_type:          tissue
  acquisition_datetime: discovered.czi_acquisition_datetime
  project_hint:         "AE-biomeGUNE-${discovered.project}"
  notes:                "WGA fluorescence WSI batch (${discovered.stain} stain at ${discovered.czi_objective_mag}x NA${discovered.czi_objective_na})"

# operator = the tech who RAN the scope for this acquisition (SIDECAR-ONLY,
# 2026-06-09 — kept for future DB/image-server search, NOT a registry column).
# AxioScan encodes it as a REQUIRED filename chunk (discovered.operator, e.g.
# "MBC"/"AUA"); it's also what the GUI uses to filter a folder to one tech's
# scans. Often != researcher.
operator: "${discovered.operator}"

# First-time project-creation defaults (10_TOOLS §2.1.4).
auto_create_project:
  owner:       "${discovered.operator}"
  description: "Auto-created from AxioScan 7 ingest; animal-project chunk ${discovered.project}."
  notes:       "Auto-created on first ingest. Owner = filename operator chunk; edit _project.yaml to reassign."

# Name of the project hard link placed under /projects/<proj>/raw_linked/.
# (Hard link since 2026-06-02 — resolved value used verbatim, no extension;
# was a .lnk shortcut before. See 10_TOOLS §2.1.1.)
# Resolver-evaluated; see the "AUTO-DISCOVERED FIELDS" section above.
# Default keeps the full informative source filename and adds an
# instrument prefix so MRI / EM / etc. links coexist cleanly.
# Example resolved value: ZWSI_MFB_MBC_0423_ID13B_WGA_10x.czi
link_filename: "${instrument}_${original_name}"

# ============================================================================
# PRECLINICAL METADATA — condition: block (LIVE, Phase 3)
# ============================================================================
# Written into metadata.json for every acquisition this batch produces
# (sample_type = tissue). NON-BLOCKING (08_METADATA §4.7): leave a value
# unknown and the writer records an explicit sentinel (null / "") and WARNs —
# it never refuses the ingest. SET ONCE PER BATCH: edit the values below, then
# every acq inherits them.
#
# ⚠️ AxioScan batches OFTEN MIX COHORTS — a single day folder commonly holds
# slides from several animals spanning both control and disease-model arms.
# A batch-level condition: is correct only for a single-cohort batch. For the
# common mixed case, set is_control: null here and OVERRIDE per-acq at
# /projects/<proj>/metadata/<acq_id>.json so each slide carries the right
# cohort assignment.
#
# subject: (species/strain/sex/DOB->age of the SOURCE ANIMAL) is filled
# automatically from the animal-facility DB via auto_discover.subject_from_db
# above — no manual block needed. To OVERRIDE the DB (or supply it when the
# animal isn't in the DB), uncomment the subject: block at the bottom.
#
# anatomy: block — for TISSUE this records the UBERON organ/region the section
# was cut from (region-only; is_whole_body is N/A for an ex-vivo section, so it
# stays null and is not warned). This is the SAME UBERON anatomical-entity
# concept as the in-vivo anatomy.region, queryable across in-vivo scans + ex-vivo
# sections. The organ is also hinted by sample_short's letter (the "B" in
# "ID13B"), but the letter->UBERON mapping is lab-specific — set the UBERON term
# explicitly per batch below.
#
# Spec: 08_METADATA §4.4 (subject) / §4.5 (condition) / §4.6 (anatomy).

condition:
  # EDIT per batch — the primary cohort filter. true=control, false=case
  # (disease/treated), null=unknown (WARN, still ingests). Leave null for a
  # mixed-cohort batch and override per-acq (see warning above).
  is_control:    null
  # EDIT — model classification or "wild_type" / "non_transgenic". Empty -> ""
  # + WARN.
  disease_model: ""
  # EDIT — state at section time (ex-vivo tissue): typically "endpoint" /
  # "post_mortem_<context>" / "<intervention>_day_N".
  disease_state: ""
  # control_type:   "naive"      # optional when is_control=true: naive/sham/vehicle/littermate
  # treatment:      null         # optional free-text
  # timepoint_days: null         # optional numeric — days from intervention
  # study_arm:      "control"    # optional cohort-grouping label
  source:        "operator-entered"   # operator-entered | study-yaml | imported-from-excel

anatomy:
  # Ex-vivo tissue: is_whole_body is N/A (a section is never whole-body) -> left
  # null and NOT warned. The meaningful field is the UBERON organ/region the
  # section was cut from. EDIT per batch (one batch of slides is usually one
  # organ) or override per-acq in /projects/<proj>/metadata/<acq_id>.json.
  # NON-BLOCKING: an empty region just WARNs, the acq still ingests.
  is_whole_body: null
  # region:                       # uncomment + fill (verified UBERON ids in 08_METADATA §4.6)
  #   label:    "heart"
  #   ontology: "UBERON"
  #   id:       "UBERON:0000948"
  source:        "operator-entered"

# OPTIONAL subject: override — only needed to override the DB lookup or when
# the source animal isn't in the DB. Recognized fields: facility_animal_id,
# species, strain, sex, date_of_birth, age_at_acquisition, genotype,
# weight_at_acquisition_g, cohort_id, procedures, source. age_at_acquisition
# is derived from date_of_birth automatically when present (for tissue, the
# source animal's age at euthanasia, not the section date).
# subject:
#   species:            "Mus musculus"
#   strain:             "C57BL/6J"
#   sex:                "F"
#   date_of_birth:      "2025-01-15"
#   source:             "operator-entered"
#
# For NON-BIOLOGICAL samples (sample_type = material / phantom):
# the condition: block is NOT required — comment out or leave absent.
