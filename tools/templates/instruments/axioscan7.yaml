# Per-instrument template — AxioScan 7 (Zeiss whole-slide scanner).
# Instrument code: ZWSI. Ecosystem: MICROSCOPY.
#
# Copy this file to `tools/configs/axioscan7_<batch>.yaml` (a name that
# identifies this run — e.g. the day folder date or campaign label),
# edit the marked placeholders, then run.
#
# ============================================================================
# AUTO-DISCOVERED FIELDS AVAILABLE TO THE OPERATOR
# ============================================================================
# Every entry below is automatically populated per acquisition and may be
# referenced as `discovered.<name>` (bare ref) or `${discovered.<name>}`
# (interpolation) in any resolver-evaluated YAML field below (`registry:`,
# `auto_create_project:`, top-level `link_filename:`).
#
# Filename chunks (from filename_parse below, split on `_`):
#   discovered.group_code         e.g. "MFB" (project filter — fixed)
#   discovered.operator           e.g. "MBC" (initials)
#   discovered.project            e.g. "0423" — animal-project short id
#   discovered.sample_short       e.g. "ID13B" — short sample identifier
#                                  (organ-letter suffix not parsed today)
#   discovered.stain              e.g. "WGA"
#   discovered.magnification      e.g. "10x"
#
# Standard auto-discovery (any instrument):
#   discovered.filename           full basename incl. .czi extension
#   discovered.acquisition_date   YYYYMMDD parsed from the parent folder
#                                  name (used only as a fallback when
#                                  .czi-embedded timestamp is unavailable)
#
# .czi-embedded metadata (21 fields, all prefixed `czi_`) — extracted via
# `czifile` from each file at ingest time. See 09_MODALITIES §1.1 for the
# full per-instrument table. Highlights:
#   discovered.czi_acquisition_datetime  ISO timestamp (preferred)
#   discovered.czi_microscope_name       e.g. "Axioscan 7"
#   discovered.czi_microscope_type       e.g. "Upright"
#   discovered.czi_objective_name        e.g. "Plan-Apochromat 20x/0.8 M27"
#   discovered.czi_objective_mag         e.g. "20"
#   discovered.czi_objective_na          e.g. "0.8"
#   discovered.czi_pixel_size_x_um       µm; same for y
#   discovered.czi_size_x / _y / _c / _z / _t / _s / _m   image dims
#   discovered.czi_pixel_type            e.g. "Bgr24"
#   discovered.czi_compression           e.g. "JpegXr"
#   discovered.czi_acquisition_mode      e.g. "WideField"
#   discovered.czi_contrast_method       e.g. "Brightfield"
#   discovered.czi_user                  ZEN account
#   discovered.czi_zen_version           e.g. "3.6"
#
# Resolver also provides these in resolver-evaluated fields below:
#   ${instrument}              "ZWSI" after registry resolution
#   ${sample_id}               resolved composite per registry: block
#   ${acquisition_datetime}    resolved ISO datetime
#   ${original_name}           source filename (the .czi as deposited)
#   ${acq_id}                  generated ACQ-ID (e.g. ACQ-20260215-ZWSI-001)
#   ${acq_date}                YYYYMMDD form of the acquisition date
#
# ============================================================================
# WHAT'S PRE-FILLED (don't touch unless you know why)
# ============================================================================
#   - `pattern`, `filename_parse`, `filter`, `acquisition_date_from`
#     encode the AxioScan-7 / MFB filename and day-folder conventions.
#   - `instrument`, `data_ecosystem`, `instrument_model`,
#     `acquisition_datetime` use the .czi-embedded values where they
#     beat any filename or folder-derived guess.
#   - `sample_id`, `project_hint`: pilot conventions per
#     06_REGISTRIES §2.3 (composite sample_id) and the AE-biomeGUNE-NNNN
#     animal-project naming.
#   - `auto_create_project:` — first-time project creation defaults; see
#     10_TOOLS §2.1.4.
#   - `link_filename:` — `${instrument}_${original_name}` keeps the full
#     informative filename + a clear instrument prefix in the project's
#     raw_linked/ folder. Resolver-evaluated at link-creation time.
#
# ============================================================================
# WHAT YOU MUST EDIT PER BATCH
# ============================================================================
#   - `auto_discover.staging_dir`         <-- point at this batch's day folder
#   - `registry.notes`                    <-- short batch description
#
# What you may want to change per batch (rarely):
#   - `ingest.delete_source_after_ingest` (default false; opt in only after
#     you've verified a real run for this batch)
#   - `ingest.auto_create_projects` (default true for AxioScan)
#
# Extends the universal starter at tools/templates/ingest_template.yaml.
# Per-instrument convention only — other groups using the same scanner
# with different filename conventions would need their own template.
#
# Project naming note: AE-biomeGUNE-NNNN comes from the animal-project
# approval system — durable and shared across the institute. Reasonable
# interim pattern per 05_PROJECTS §9 (PROJ-05); not a stopgap.

ingest:
  delete_source_after_ingest: false
  auto_create_projects: true

auto_discover:
  # EDIT: absolute path to this batch's day folder under the AxioScan
  # share. Use forward slashes; Python normalizes on Windows.
  staging_dir: "S:/goptical/GOpticalUsers data/AxioScan/<YYYYMMDD>"
  pattern: "*.czi"
  filename_parse:
    separator: "_"
    # AxioScan + MFB convention:
    # <group_code>_<operator>_<project>_<sample_short>_<stain>_<magnification>.czi
    fields: [group_code, operator, project, sample_short, stain, magnification]
  filter:
    group_code: MFB
  acquisition_date_from: parent_folder_name

registry:
  instrument:           ZWSI
  data_ecosystem:       MICROSCOPY
  instrument_model:     discovered.czi_microscope_name
  modalities_in_study:  NA
  operator:             discovered.operator
  data_source:          internal
  sample_id:            "${discovered.project}_${discovered.sample_short}"
  sample_type:          tissue
  acquisition_datetime: discovered.czi_acquisition_datetime
  project_hint:         "AE-biomeGUNE-${discovered.project}"
  notes:                "WGA fluorescence WSI batch (${discovered.stain} stain at ${discovered.czi_objective_mag}x NA${discovered.czi_objective_na})"

# First-time project-creation defaults (10_TOOLS §2.1.4).
auto_create_project:
  owner:       "${discovered.operator}"
  description: "Auto-created from AxioScan 7 ingest; animal-project chunk ${discovered.project}."
  notes:       "Auto-created on first ingest. Owner = filename operator chunk; edit _project.yaml to reassign."

# Name of the project hard link placed under /projects/<proj>/raw_linked/.
# (Hard link since 2026-06-02 — resolved value used verbatim, no extension;
# was a .lnk shortcut before. See 10_TOOLS §2.1.1.)
# Resolver-evaluated; see the "AUTO-DISCOVERED FIELDS" section above.
# Default keeps the full informative source filename and adds an
# instrument prefix so MRI / EM / etc. links coexist cleanly.
# Example resolved value: ZWSI_MFB_MBC_0423_ID13B_WGA_10x.czi
link_filename: "${instrument}_${original_name}"

# ============================================================================
# PRECLINICAL METADATA — subject: + condition: blocks
# (FORWARD-COMPATIBLE SCAFFOLDING; writer ships in Phase 3 of tasks.md §3.2)
# ============================================================================
# Until the Phase 3 sidecar writer lands, anything in these blocks is IGNORED
# by the ingest pipeline. Uncomment + fill once the writer is live.
#
# Required when sample_type ∈ {organism, tissue} — for MFB AxioScan work, this
# is the typical case (H&E / IHC / fluorescence sections from mouse organs →
# sample_type = tissue, defaulted by this template). NOT required when scanning
# non-biological samples (sample_type = material / phantom).
#
# Spec: [08_METADATA §4.4 (subject:) + §4.5 (condition:)].
#
# Source pipelines:
#   subject:    per-subject, fixed. For tissue sections, "subject" = the
#               animal the tissue came from. Auto from animal-facility-DB
#               once integration lands; until then operator-entered. The
#               facility_animal_id ties the slide back to its source animal.
#   condition:  per-acquisition, varies. For a batch of slides from a mixed
#               cohort (some WT, some disease-model), condition: needs to be
#               per-acquisition — set via /projects/<proj>/metadata/<acq_id>.json
#               instead of the batch-level block here.

# subject:
#   species:                 "Mus musculus"         # DECIDED-REQUIRED
#   strain:                  "C57BL/6J"             # DECIDED-REQUIRED — strain of the source animal
#   sex:                     "F"                    # DECIDED-REQUIRED — "M" | "F" | "unknown"
#   age_at_acquisition:      "P12W"                 # DECIDED-REQUIRED — age of source animal at the time of euthanasia (not the section date)
#   genotype:                "WT"                   # optional but recommended
#   facility_animal_id:      "<animal_code>-AE-biomaGUNE-<NNNN>"  # SUBJECT id = facility canonical animal id (06_REGISTRIES §2.3) + DB lookup key. Parse animal_code from sample_short (ID13B→13) + NNNN from project (0423); organ (B) → anatomical_entity, NOT the id. Auto-compose pending (tasks §3.2).
#   source:                  "operator-entered"     # "animal-facility-db" | "operator-entered"

# condition:
#   disease_model:           "wild_type"            # DRAFT-REQUIRED — model classification OR "wild_type" / "non_transgenic"
#   disease_state:           "endpoint"             # DRAFT-REQUIRED — for ex-vivo tissue: typically "endpoint" / "post_mortem_<context>" / "<intervention>_day_N"
#   is_control:              true                   # DECIDED-REQUIRED — strict boolean (writer REFUSES sidecar write if missing for organism/tissue)
#   control_type:            "naive"                # optional when is_control=true: "naive" / "sham" / "vehicle" / "littermate"
#   treatment:               null                   # optional free-text
#   timepoint_days:          null                   # optional numeric
#   study_arm:               "control_naive"        # optional — explicit experimental-arm label
#   source:                  "operator-entered"     # provenance
#
# For NON-BIOLOGICAL samples (sample_type = material / phantom):
# both blocks are NOT required — comment out or leave absent.
