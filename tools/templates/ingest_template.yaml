# Ingest config template — copy and edit for your batch.
#
# Three required top-level blocks, plus one optional:
#
#   ingest:                Pipeline control flags (not registry columns).
#   auto_discover:         How to find cases and what variables to extract per case.
#                          Each case's discovered fields land in `discovered.<name>`,
#                          usable as references below. Supports filename_parse and/or
#                          path_parse — see comments in that block.
#   registry:              Explicit per-column mapping for the registry row. Three
#                          value forms:
#                            <literal>                 plain text/number
#                            discovered.<field>        bare reference (after auto_discover)
#                            "...${discovered.<f>}..." string interpolation
#                            NA                        explicit "no value" (column left empty)
#                          Auto-populated columns (acq_id, registration_datetime,
#                          primary_file_name, file_format, file_size_mb, file_count,
#                          canonical_path, checksum_present, extended_metadata_present,
#                          original_name, ingest_config) are NOT listed here.
#   auto_create_project:   OPTIONAL. Only consulted when ingest.auto_create_projects
#                          is true AND a project is being created for the first
#                          time. Supplies owner/description/notes for the new
#                          project. Resolver-evaluated like `registry:`.
#                          First-write-wins — never updates an existing project.
#
# Save edited copies under tools/configs/<instrument>_<day-or-batch>.yaml so
# the path appears in the ingest_config registry column.
#
# --------------------------------------------------------------------------
# ⚠️ PROJECT NAMING — OPEN GROUP-CONSENSUS QUESTION
# --------------------------------------------------------------------------
# `registry.project_hint` determines the short_name of any auto-created
# project. The project short_name is the daily handle the group will use
# to find raw data and intermediates — it needs to MEAN something to them.
#
# A project is NOT an experiment, an assay, or a study. A real project
# typically contains many of those over its lifetime. Good candidates:
#   - funded project name (e.g. ERC grant ID)
#   - animal-project approval ID (e.g. AE-biomeGUNE-NNNN)
#   - an explicit internal name the group has agreed on
#
# Provisional patterns currently in use during the pilot (stopgaps):
#   - AxioScan: AE-biomeGUNE-NNNN — reasonable interim (animal-project codes)
#   - Cell Observer cells-mode: ${researcher}-${experiment} — stopgap only
#
# See 05_PROJECTS.md §9 for the full warning and open question (PROJ-05).
# When you set project_hint below, prefer a real, durable naming convention.
# --------------------------------------------------------------------------

# -----------------------------------------------------------------------------
ingest:
  delete_source_after_ingest: false   # remove source file/folder after verify
  # When `registry.project_hint` resolves to a value that isn't an
  # existing PROJ-XXXX or short_name in registry_projects.csv, auto-create
  # a project with that value as the short_name. First ingest creates;
  # subsequent ingests with the same hint reuse via short_name lookup.
  # Default false to prevent typos creating rogue projects silently.
  # When you enable it, fill in the `auto_create_project:` block below.
  auto_create_projects: false
  # archive_format: zip               # DICOM only (planned)
  # lightweight: false                # planned

# -----------------------------------------------------------------------------
auto_discover:
  staging_dir: "<absolute path to the source directory>"

  # Use "*.czi" for a single-level file glob, or "**/*.czi" for recursive
  # (required when path_parse is in use). For directory-mode batches
  # (e.g. DICOM source folders), use a trailing slash: "HPIC*/".
  pattern: "*.czi"

  # FILE MODE — parse each filename's stem on `separator`, zip with
  # `fields` positionally. Each chunk becomes a discovered.<field>.
  # Drop or comment out for directory-mode batches or when all the
  # metadata lives in the path instead.
  #
  # CHUNK NAMES ARE FREE-FORM LABELS — they're picked by you to describe
  # this instrument's filename convention. The pipeline never inspects
  # them; only the registry: and auto_create_project: references consume
  # them. Pick names that read clearly for the convention you're capturing.
  filename_parse:
    separator: "_"
    fields: [group_code, operator, project, sample_id, stain, magnification]

  # PATH MODE (optional, can be combined with filename_parse) — parse the
  # path components BETWEEN staging_dir AND the file, top-down, one named
  # level per component. Each level becomes a discovered.<name>.
  #
  # Requires `pattern: "**/*.czi"` (or similar recursive glob).
  # LEVEL NAMES ARE FREE-FORM LABELS — same rule as filename_parse fields.
  # Mismatched-depth files are skipped with a WARN.
  #
  # Example (Cell Observer-style layout, <staging_dir>/<researcher>/<cell_line>/<experiment>/file.czi):
  # path_parse:
  #   levels:
  #     - researcher
  #     - cell_line
  #     - experiment

  # OPTIONAL filter on parsed fields. Cases not matching are skipped.
  filter:
    group_code: MFB

  # OPTIONAL: extract YYYYMMDD (or DDMMYYYY) from the parent folder name
  # (e.g. AxioScan day folder) and put it in discovered.acquisition_date.
  acquisition_date_from: parent_folder_name

# -----------------------------------------------------------------------------
registry:
  # User-required (key must be present; NA allowed where intentional).
  instrument:           ZWSI                          # ZWSI, CELL, LSM9, MRI, PET, ...
  data_ecosystem:       MICROSCOPY                    # MICROSCOPY, DICOM, EM
  operator:             discovered.operator
  data_source:          internal                      # or "collaborator:<name>"

  # Recommended.
  acquisition_datetime: discovered.acquisition_date   # or literal ISO; NA to backfill later
  sample_id:            discovered.sample_id
  sample_type:          NA                            # tissue/organism/cells/material/phantom (06_REGISTRIES §2.4 DRAFT)
  instrument_model:     "Zeiss Axio Scan 7"

  # Optional.
  modalities_in_study:  NA                            # populated for hybrid DICOM (e.g. "PT;CT")
  project_hint:         NA                            # PROJ-XXXX, triggers .lnk creation. See WARNING at top of file.
  notes:                "Routine WSI batch; ${discovered.stain} stain at ${discovered.magnification}"

# -----------------------------------------------------------------------------
# OPTIONAL — only consulted when ingest.auto_create_projects: true AND
# the project named by registry.project_hint does not yet exist.
# Resolver-evaluated like the registry: block. First-write-wins: this
# block is NEVER read for an already-existing project. The source of
# truth after creation is /projects/<proj>/_project.yaml (manually
# editable). Empty resolved values produce a WARN, not an error.
#
# Recognized fields: owner, description, notes.
#
# auto_create_project:
#   owner:       "${discovered.operator}"
#   description: "Auto-created on first ingest from ${discovered.<something>}"
#   notes:       ""
